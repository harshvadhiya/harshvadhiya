name: Generate Contribution Snake

# Runs every 12 hours, on push to main, and can be triggered manually
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Generate github-readme-stats SVGs
        run: |
          mkdir -p dist
          git clone https://github.com/anuraghazra/github-readme-stats.git grs
          cd grs
          npm install
          # Start the server in the background using the user's PAT (GH_TOKEN)
          PAT_1="${{ secrets.GH_TOKEN }}" PORT=9000 node express.js &
          # Wait 10 seconds for server to start
          sleep 10
          # Fetch stats card
          curl -s "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true&show=reviews,prs_merged,prs_merged_percentage&rank_icon=percentile&theme=tokyonight&hide_border=true&bg_color=00000000&title_color=00BFA6&icon_color=2a5298&text_color=c9d1d9" -o ../dist/github-stats.svg
          # Fetch top languages card
          curl -s "http://localhost:9000/api/top-langs/?username=${{ github.repository_owner }}&layout=donut&langs_count=8&theme=tokyonight&hide_border=true&bg_color=00000000&title_color=00BFA6&text_color=c9d1d9" -o ../dist/github-top-langs.svg
          # Kill background server
          kill $!

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}